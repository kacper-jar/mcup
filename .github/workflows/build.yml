name: Build & Release

on:
  push:
    tags:
      - '*'
  workflow_dispatch:

jobs:
  pre-build-selfcheck:
    name: Pre-build Selfcheck
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Project
        run: |
          python -m pip install --upgrade pip
          pip install .

      - name: Run Selfcheck
        run: |
          mcup config set devtools.enabled true
          mcup devtools selfcheck

  build-wheels:
    name: Build wheels
    runs-on: ubuntu-latest
    needs: pre-build-selfcheck

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build tool
        run: python -m pip install --upgrade pip build

      - name: Build wheels
        run: python -m build --wheel --outdir ./wheelhouse

      - name: Upload Wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels
          path: ./wheelhouse/*.whl

  build-linux-packages:
    name: Build Linux Packages (${{ matrix.arch }})
    runs-on: ubuntu-latest
    needs: build-executables
    strategy:
      matrix:
        arch: [amd64, arm64]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Executables
        uses: actions/download-artifact@v4
        with:
          name: executables-${{ matrix.arch == 'amd64' && 'ubuntu-latest' || 'ubuntu-24.04-arm' }}-${{ matrix.arch }}
          path: ./dist

      - name: Install pacman package dependencies
        run: sudo apt-get update && sudo apt-get install -y libarchive-tools zip unzip

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'

      - name: Install fpm
        run: gem install fpm --no-document

      - name: Prepare packaging environment
        run: |
          mkdir -p linux-packages
          cd dist
          unzip -o -j *.zip
          chmod +x mcup
          cd ..

      - name: Extract version
        id: meta
        env:
          PYTHONIOENCODING: utf-8
        run: |
          VERSION=$(python -c "import re; print(re.search(r'version\s*=\s*\"([^\"]+)\"', open('pyproject.toml', encoding='utf-8').read()).group(1))")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build .deb package
        run: fpm -s dir -t deb -n mcup -a ${{ matrix.arch }} --version "${{ steps.meta.outputs.version }}" -p linux-packages/ dist/mcup=/usr/bin/mcup

      - name: Build .rpm package
        run: fpm -s dir -t rpm -n mcup -a ${{ matrix.arch == 'amd64' && 'x86_64' || 'aarch64' }} --version "${{ steps.meta.outputs.version }}" -p linux-packages/ dist/mcup=/usr/bin/mcup

      - name: Build pacman package
        shell: bash
        run: |
          PACMAN_VERSION=$(echo "${{ steps.meta.outputs.version }}" | tr '-' '_')
          fpm -s dir -t pacman -n mcup -a ${{ matrix.arch == 'amd64' && 'x86_64' || 'aarch64' }} --version "$PACMAN_VERSION" -p linux-packages/ dist/mcup=/usr/bin/mcup

      - name: Upload Linux Packages
        uses: actions/upload-artifact@v4
        with:
          name: linux-packages-${{ matrix.arch }}
          path: ./linux-packages/*

  build-executables:
    name: Build Executables on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    needs: pre-build-selfcheck
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            arch: amd64
          - os: windows-latest
            arch: amd64
          - os: macos-latest
            arch: arm64
          - os: ubuntu-24.04-arm
            arch: arm64

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PyInstaller and Project
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install .

      - name: Extract Metadata
        id: meta
        shell: bash
        env:
          PYTHONIOENCODING: utf-8
        run: |
          VERSION=$(python -c "import re; print(re.search(r'version\s*=\s*\"([^\"]+)\"', open('pyproject.toml', encoding='utf-8').read()).group(1))")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build executable
        run: pyinstaller --onefile --name mcup mcup/__main__.py

      - name: Package Executable
        shell: bash
        run: |
          cd dist
          PLATFORM="linux"
          if [ "$RUNNER_OS" == "Windows" ]; then
            PLATFORM="windows"
            7z a mcup-${{ steps.meta.outputs.version }}-$PLATFORM-${{ matrix.arch }}.zip mcup.exe
          elif [ "$RUNNER_OS" == "macOS" ]; then
            PLATFORM="macos"
            zip -j mcup-${{ steps.meta.outputs.version }}-$PLATFORM-${{ matrix.arch }}.zip mcup
          else
            zip -j mcup-${{ steps.meta.outputs.version }}-$PLATFORM-${{ matrix.arch }}.zip mcup
          fi

      - name: Upload executable
        uses: actions/upload-artifact@v4
        with:
          name: executables-${{ matrix.os }}-${{ matrix.arch }}
          path: dist/*.zip

  build-windows-installer:
    name: Build Windows Installer
    runs-on: windows-latest
    needs: build-executables

    steps:
      - uses: actions/checkout@v4

      - name: Download Windows Executable
        uses: actions/download-artifact@v4
        with:
          name: executables-windows-latest-amd64
          path: dist

      - name: Unzip Windows Executable
        shell: bash
        run: |
          cd dist
          7z x -y *.zip

      - name: Extract Metadata
        id: meta
        shell: bash
        env:
          PYTHONIOENCODING: utf-8
        run: |
          VERSION=$(python -c "import re; print(re.search(r'version\s*=\s*\"([^\"]+)\"', open('pyproject.toml', encoding='utf-8').read()).group(1))")
          AUTHOR=$(python -c "import re; print(re.search(r'authors\s*=\s*\[\{\s*name\s*=\s*\"([^\"]+)\"', open('pyproject.toml', encoding='utf-8').read()).group(1))")
          NAME=$(python -c "import re; print(re.search(r'^name\s*=\s*\"([^\"]+)\"', open('pyproject.toml', encoding='utf-8').read(), re.MULTILINE).group(1))")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "author=$AUTHOR" >> $GITHUB_OUTPUT
          echo "name=$NAME" >> $GITHUB_OUTPUT

      - name: Build Installer
        run: iscc /DMyAppName="${{ steps.meta.outputs.name }}" /DMyAppVersion="${{ steps.meta.outputs.version }}" /DMyAppPublisher="${{ steps.meta.outputs.author }}" packaging\windows\installer.iss

      - name: Rename Installer
        shell: bash
        run: |
          cd packaging/windows/Output
          mv mcup-windows-setup.exe mcup-${{ steps.meta.outputs.version }}-windows-setup.exe

      - name: Upload Installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: packaging\windows\Output\mcup-*-windows-setup.exe

  test-linux-packages:
    name: Test Linux Packages (${{ matrix.arch }})
    runs-on: ubuntu-latest
    needs: build-linux-packages
    strategy:
      matrix:
        arch: [amd64, arm64]

    steps:
      - name: Set up QEMU
        if: matrix.arch == 'arm64'
        uses: docker/setup-qemu-action@v3

      - name: Download Linux Packages
        uses: actions/download-artifact@v4
        with:
          name: linux-packages-${{ matrix.arch }}
          path: ./linux-packages

      - name: Install and Test .deb Package via Docker
        run: |
          docker run --rm --platform linux/${{ matrix.arch }} -v ${{ github.workspace }}/linux-packages:/pkg ubuntu:latest bash -c "apt-get update && apt-get install -y /pkg/*.deb && mcup config set devtools.enabled true && mcup devtools selfcheck"

      - name: Install and Test .rpm Package via Docker
        run: |
          docker run --rm --platform linux/${{ matrix.arch }} -v ${{ github.workspace }}/linux-packages:/pkg fedora:latest bash -c "dnf install -y /pkg/*.rpm && mcup config set devtools.enabled true && mcup devtools selfcheck"

      - name: Install and Test Pacman Package via Docker
        if: matrix.arch == 'amd64'
        run: |
          docker run --rm --platform linux/${{ matrix.arch }} -v ${{ github.workspace }}/linux-packages:/pkg archlinux:latest bash -c "pacman -U --noconfirm /pkg/*.pkg.tar.* && mcup config set devtools.enabled true && mcup devtools selfcheck"

  test-executables:
    name: Test Executables on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    needs: build-executables
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            arch: amd64
          - os: windows-latest
            arch: amd64
          - os: macos-latest
            arch: arm64
          - os: ubuntu-24.04-arm
            arch: arm64

    steps:
      - name: Download Executable
        uses: actions/download-artifact@v4
        with:
          name: executables-${{ matrix.os }}-${{ matrix.arch }}
          path: dist

      - name: Run Selfcheck Validation
        shell: bash
        run: |
          cd dist
          if [ "$RUNNER_OS" == "Windows" ]; then
            7z x -y *.zip
            BIN="./mcup.exe"
          else
            unzip -o -j *.zip
            BIN="./mcup"
            chmod +x $BIN
          fi
          
          $BIN config set devtools.enabled true
          $BIN devtools selfcheck

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-wheels, build-windows-installer, test-linux-packages, test-executables]
    if: github.ref_type == 'tag'
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          prerelease: ${{ contains(github.ref, 'rc') || contains(github.ref, 'alpha') || contains(github.ref, 'beta') }}
          files: |
            ./artifacts/wheels/*.whl
            ./artifacts/linux-packages-*/*.deb
            ./artifacts/linux-packages-*/*.rpm
            ./artifacts/linux-packages-*/*.apk
            ./artifacts/linux-packages-*/*.pkg.tar.*
            ./artifacts/executables-*/*.zip
            ./artifacts/windows-installer/*.exe

