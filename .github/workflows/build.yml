name: Build & Release

on:
  push:
    tags:
      - '*'
  workflow_dispatch:

jobs:
  build-wheels:
    name: Build wheels
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install build tool
        run: python -m pip install --upgrade pip build

      - name: Build wheels
        run: python -m build --wheel --outdir ./wheelhouse

      - name: Upload Wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels
          path: ./wheelhouse/*.whl

  build-linux-packages:
    name: Build Linux Packages
    runs-on: ubuntu-latest
    needs: build-wheels

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Wheels
        uses: actions/download-artifact@v4
        with:
          name: wheels
          path: ./wheelhouse

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          
      - name: Install fpm
        run: gem install fpm --no-document

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install FPM Python dependencies
        run: python -m pip install packaging

      - name: Prepare packaging environment
        run: |
          mkdir -p linux-packages
          WHEEL=$(ls ./wheelhouse/*.whl | head -n 1)
          echo "Using wheel: $WHEEL"
          echo "WHEEL_PATH=$WHEEL" >> $GITHUB_ENV

      - name: Build .deb package
        run: fpm -s python -t deb -p linux-packages/ "$WHEEL_PATH"

      - name: Build .rpm package
        run: fpm -s python -t rpm -p linux-packages/ "$WHEEL_PATH"

      - name: Upload Linux Packages
        uses: actions/upload-artifact@v4
        with:
          name: linux-packages
          path: ./linux-packages/*

  build-executables:
    name: Build Executables on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install PyInstaller and Project
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install .

      - name: Build executable
        run: pyinstaller --onefile --name mcup mcup/__main__.py

      - name: Upload executable
        uses: actions/upload-artifact@v4
        with:
          name: executables-${{ matrix.os }}
          path: dist/mcup*

  build-windows-installer:
    name: Build Windows Installer
    runs-on: windows-latest
    needs: build-executables

    steps:
      - uses: actions/checkout@v4

      - name: Download Windows Executable
        uses: actions/download-artifact@v4
        with:
          name: executables-windows-latest
          path: dist

      - name: Extract Metadata
        id: meta
        shell: bash
        env:
          PYTHONIOENCODING: utf-8
        run: |
          VERSION=$(python -c "import re; print(re.search(r'version\s*=\s*\"([^\"]+)\"', open('pyproject.toml', encoding='utf-8').read()).group(1))")
          AUTHOR=$(python -c "import re; print(re.search(r'authors\s*=\s*\[\{\s*name\s*=\s*\"([^\"]+)\"', open('pyproject.toml', encoding='utf-8').read()).group(1))")
          NAME=$(python -c "import re; print(re.search(r'^name\s*=\s*\"([^\"]+)\"', open('pyproject.toml', encoding='utf-8').read(), re.MULTILINE).group(1))")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "author=$AUTHOR" >> $GITHUB_OUTPUT
          echo "name=$NAME" >> $GITHUB_OUTPUT

      - name: Build Installer
        run: iscc /DMyAppName="${{ steps.meta.outputs.name }}" /DMyAppVersion="${{ steps.meta.outputs.version }}" /DMyAppPublisher="${{ steps.meta.outputs.author }}" packaging\windows\installer.iss

      - name: Upload Installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: packaging\windows\Output\mcup-windows-setup.exe

  test-executables:
    name: Test Executables on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    needs: build-executables
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Download Executable
        uses: actions/download-artifact@v4
        with:
          name: executables-${{ matrix.os }}
          path: dist

      - name: Run Selfcheck Validation
        shell: bash
        run: |
          cd dist
          if [ "$RUNNER_OS" == "Windows" ]; then
            BIN="./mcup.exe"
          else
            BIN="./mcup"
            chmod +x $BIN
          fi
          
          $BIN config set devtools.enabled true
          $BIN devtools selfcheck

  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [build-wheels, build-linux-packages, build-executables, build-windows-installer, test-executables]
    if: github.ref_type == 'tag'
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          prerelease: ${{ contains(github.ref, 'rc') || contains(github.ref, 'alpha') || contains(github.ref, 'beta') }}
          files: |
            ./artifacts/wheels/*.whl
            ./artifacts/linux-packages/*.deb
            ./artifacts/linux-packages/*.rpm
            ./artifacts/executables-*/*
            ./artifacts/windows-installer/*.exe
