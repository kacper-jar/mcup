name: Build Pipeline

on:
  push:
    tags:
      - '*'
  workflow_dispatch:

jobs:
  build-wheels:
    name: Build wheels
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install build tool
        run: python -m pip install --upgrade pip build

      - name: Build wheels
        run: python -m build --wheel --outdir ./wheelhouse

      - name: Upload Wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels
          path: ./wheelhouse/*.whl

  build-linux-packages:
    name: Build Linux Packages
    runs-on: ubuntu-latest
    needs: build-wheels

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Wheels
        uses: actions/download-artifact@v4
        with:
          name: wheels
          path: ./wheelhouse

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          
      - name: Install fpm
        run: gem install fpm --no-document

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Build .deb and .rpm packages
        run: |
          mkdir -p linux-packages
          
          WHEEL=$(ls ./wheelhouse/*.whl | head -n 1)
          echo "Using wheel: $WHEEL"
          
          fpm -s python -t deb -p linux-packages/ "$WHEEL"
          
          fpm -s python -t rpm -p linux-packages/ "$WHEEL"

      - name: Upload Linux Packages
        uses: actions/upload-artifact@v4
        with:
          name: linux-packages
          path: ./linux-packages/*

  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [build-wheels, build-linux-packages]
    if: github.ref_type == 'tag'
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          prerelease: ${{ contains(github.ref, 'rc') || contains(github.ref, 'alpha') || contains(github.ref, 'beta') }}
          files: |
            ./artifacts/wheels/*.whl
            ./artifacts/linux-packages/*.deb
            ./artifacts/linux-packages/*.rpm
